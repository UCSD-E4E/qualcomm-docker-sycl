name: Docker Image CI

on:
  push:
    branches: [ "main", "msm" ]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    
    steps:
    - name: Docker/ENV cleanup Cleanup
      run: |
        docker image prune -a -f
        docker container prune -f
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
    - 
      uses: actions/checkout@v4
      
    - name: Determine Docker Tag
      id: set-tag
      run: |
        # If the branch is 'main', tag as 'latest'. Otherwise, use the branch name.
        if [ "${{ github.ref_name }}" == "main" ]; then
          echo "DOCKER_TAG=latest" >> $GITHUB_ENV
        else
          echo "DOCKER_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
        fi

    -
      name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    -
      name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    -
      name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile
        # Use the environment variable dynamically set in the previous step
        tags: ghcr.io/ucsd-e4e/qualcomm-docker-sycl:${{ env.DOCKER_TAG }}
        platforms: linux/aarch64
        push: true
